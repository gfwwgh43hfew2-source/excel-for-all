<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>المصاريف والتشغيل - منتجع حياله</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        /* ============================================================
                   ROOT VARIABLES
                ============================================================ */
        :root {
            --primary: #0EA5E9;
            --primary-dark: #0284C7;
            --primary-gradient: linear-gradient(135deg, #0EA5E9, #3B82F6);

            --secondary: #FCD34D;
            --secondary-gradient: linear-gradient(135deg, #FCD34D, #F59E0B);

            --electricity: #F59E0B;
            --electricity-gradient: linear-gradient(135deg, #F59E0B, #D97706);

            --bg-dark: #0F172A;
            --bg-card: #1E293B;
            --bg-card-hover: #2D3B52;

            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;

            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 8px 40px rgba(0, 0, 0, 0.4);
            --radius-card: 16px;
        }

        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, Arial, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            direction: rtl;
            padding: 24px 16px;
            min-height: 100vh;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary-gradient);
            border-radius: 10px;
        }

        /* ===== HEADER ===== */
        .header-main {
            background: linear-gradient(145deg, #1E293B, #0F172A);
            padding: 24px 28px;
            border-radius: var(--radius-card);
            border-right: 4px solid var(--secondary);
            box-shadow: var(--shadow-card);
            margin-bottom: 28px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(14, 165, 233, 0.05);
        }
        .header-main .brand h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--secondary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-main .brand h1 i {
            color: var(--primary);
            font-size: 1.4rem;
        }
        .header-main .brand .sub {
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 400;
            margin-top: 2px;
            padding-right: 10px;
        }
        .header-main .meta {
            text-align: left;
            font-size: 0.7rem;
            color: var(--text-muted);
            line-height: 1.8;
        }
        .header-main .meta span {
            color: var(--secondary);
            font-weight: 600;
        }

        /* ===== زر العودة ===== */
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--primary-gradient);
            color: #fff;
            padding: 10px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.3s;
            margin-bottom: 24px;
            box-shadow: 0 4px 16px rgba(14, 165, 233, 0.2);
        }
        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(14, 165, 233, 0.35);
        }

        /* ===== KPI - تصميم منظم ===== */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }
        .kpi-card {
            background: linear-gradient(145deg, #1E293B, #0F172A);
            padding: 18px 14px;
            border-radius: var(--radius-card);
            border-bottom: 3px solid var(--primary);
            box-shadow: var(--shadow-card);
            text-align: center;
            border: 1px solid rgba(14, 165, 233, 0.04);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(14, 165, 233, 0.1), transparent);
        }
        .kpi-card:hover {
            transform: translateY(-4px);
            border-bottom-color: var(--secondary);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .kpi-card .icon {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 4px;
            display: block;
        }
        .kpi-card .number {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--secondary);
            line-height: 1.3;
        }
        .kpi-card .label {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-top: 2px;
            letter-spacing: 0.2px;
        }

        /* بطاقة الكهرباء - لون مميز */
        .kpi-card.electricity {
            border-bottom-color: var(--electricity);
        }
        .kpi-card.electricity .icon {
            color: var(--electricity);
        }
        .kpi-card.electricity .number {
            color: var(--electricity);
        }
        .kpi-card.electricity::before {
            background: linear-gradient(90deg, transparent, rgba(245, 158, 11, 0.15), transparent);
        }

        /* بطاقات العقارات - صف منفصل */
        .kpi-grid-properties {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-top: 4px;
        }
        .kpi-card-property {
            background: rgba(30, 41, 59, 0.4);
            padding: 12px 10px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: 0.3s;
        }
        .kpi-card-property:hover {
            background: rgba(30, 41, 59, 0.6);
            transform: translateY(-2px);
        }
        .kpi-card-property .number {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        .kpi-card-property .label {
            font-size: 0.55rem;
            color: var(--text-muted);
            margin-top: 2px;
            font-weight: 500;
        }

        /* ===== SECTION TITLE ===== */
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--secondary);
            margin: 28px 0 14px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(252, 211, 77, 0.06);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title i {
            color: var(--primary);
        }

        /* ===== TABLE ===== */
        .table-wrapper {
            background: linear-gradient(145deg, #1E293B, #0F172A);
            border-radius: var(--radius-card);
            overflow-x: auto;
            border: 1px solid rgba(14, 165, 233, 0.04);
            box-shadow: var(--shadow-card);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            min-width: 800px;
        }
        th {
            background: rgba(14, 165, 233, 0.06);
            color: var(--primary);
            padding: 12px 10px;
            text-align: right;
            white-space: nowrap;
            font-weight: 700;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border-bottom: 1px solid rgba(14, 165, 233, 0.06);
        }
        td {
            padding: 10px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            color: var(--text-secondary);
            font-size: 0.7rem;
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover td {
            background: rgba(14, 165, 233, 0.03);
        }

        /* ===== BADGES ===== */
        .badge-expense {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 50px;
            font-size: 0.55rem;
            font-weight: 600;
            letter-spacing: 0.2px;
        }
        .badge-رواتب {
            background: rgba(14, 165, 233, 0.12);
            color: #60A5FA;
        }
        .badge-صيانة {
            background: rgba(252, 211, 77, 0.1);
            color: #FCD34D;
        }
        .badge-مشتريات {
            background: rgba(16, 185, 129, 0.1);
            color: #34D399;
        }
        .badge-تشغيل {
            background: rgba(244, 114, 182, 0.1);
            color: #F472B6;
        }
        .badge-كهرباء {
            background: rgba(245, 158, 11, 0.12);
            color: #F59E0B;
        }

        /* ===== TABLE NOTE ===== */
        .table-note {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.6rem;
            padding: 12px 0 4px;
            opacity: 0.5;
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            color: var(--text-muted);
            margin-top: 36px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 0.65rem;
            opacity: 0.4;
        }

        /* ===== LOADING & ERROR ===== */
        .loading,
        .error {
            text-align: center;
            padding: 40px 20px;
            font-size: 0.9rem;
        }
        .loading {
            color: var(--secondary);
        }
        .loading i {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .error {
            color: #ef5350;
        }
        .error small {
            display: block;
            margin-top: 8px;
            color: var(--text-muted);
            font-size: 0.7rem;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            body {
                padding: 14px 10px;
            }
            .header-main {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                padding: 18px 20px;
            }
            .header-main .meta {
                text-align: right;
                width: 100%;
            }
            .header-main .brand h1 {
                font-size: 1.3rem;
            }
            .kpi-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .kpi-card .number {
                font-size: 1.2rem;
            }
            .kpi-grid-properties {
                grid-template-columns: 1fr 1fr;
            }
            .kpi-card-property .number {
                font-size: 1rem;
            }
            table {
                font-size: 0.65rem;
                min-width: 650px;
            }
            th,
            td {
                padding: 6px 8px;
            }
            .btn-back {
                padding: 8px 18px;
                font-size: 0.75rem;
            }
        }

        @media (max-width: 480px) {
            .kpi-grid {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            .kpi-grid-properties {
                grid-template-columns: 1fr 1fr;
                gap: 6px;
            }
            .kpi-card {
                padding: 14px 8px;
            }
            .kpi-card .number {
                font-size: 1rem;
            }
            .kpi-card .icon {
                font-size: 1.2rem;
            }
            table {
                min-width: 500px;
            }
            .header-main .brand h1 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header-main">
            <div class="brand">
                <h1><i class="fas fa-wallet"></i> المصاريف والتشغيل</h1>
                <div class="sub">🏕️ منتجع وشاليهات حيالة القصيم</div>
            </div>
            <div class="meta">
                <div>📍 القصيم / بريدة - حي الخليج</div>
                <div>📱 <span>+966509982400</span></div>
                <div>🔄 آخر تحديث: <span id="updateTime">جاري التحميل...</span></div>
            </div>
        </div>

        <a href="index.html" class="btn-back">
            <i class="fas fa-arrow-right"></i> العودة للوحة الرئيسية
        </a>

        <!-- KPI -->
        <div id="kpiContainer"><div class="loading"><i class="fas fa-spinner"></i> جاري تحميل المؤشرات...</div></div>

        <!-- TABLE -->
        <div class="section-title"><i class="fas fa-list-ul"></i> سجل المصاريف</div>
        <div id="tableContainer"><div class="loading"><i class="fas fa-spinner"></i> جاري تحميل البيانات...</div></div>

        <!-- FOOTER -->
        <div class="footer">© 2026 منتجع حياله - القصيم · جميع الحقوق محفوظة · تصميم محمد خلاف</div>
    </div>

    <script>
        // =============================================
        // 🔑 بيانات الشيت - المصاريف
        // =============================================
        const SHEET_ID = '1u6SM7bWGk2fdiBJLS-N9BO7XXb45QnAp2OqYIw0STpg';
        const SHEET_NAME = 'المصاريف والتشغيل';

        async function fetchSheetData() {
            try {
                const url =
                    `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const csvText = await response.text();
                const lines = csvText.split('\n').filter(line => line.trim() !== '');
                return lines.map(line => {
                    const row = [];
                    let current = '',
                        insideQuotes = false;
                    for (let i = 0; i < line.length; i++) {
                        const char = line[i];
                        if (char === '"') insideQuotes = !insideQuotes;
                        else if (char === ',' && !insideQuotes) { row.push(current.trim());
                            current = ''; } else current += char;
                    }
                    row.push(current.trim());
                    return row;
                });
            } catch (error) { console.error(error); return null; }
        }

        function cleanNumber(value) {
            if (!value) return 0;
            if (typeof value === 'number') return value;
            const cleaned = String(value).replace(/[^0-9.]/g, '');
            return parseFloat(cleaned) || 0;
        }

        function findColumnIndex(headers, target) {
            const clean = s => String(s).trim().replace(/\s+/g, ' ');
            let idx = headers.findIndex(h => clean(h) === clean(target));
            if (idx !== -1) return idx;
            return headers.findIndex(h => clean(h).includes(clean(target)));
        }

        function getBadgeClass(category) {
            const map = {
                'رواتب': 'رواتب',
                'صيانة': 'صيانة',
                'مشتريات': 'مشتريات',
                'تشغيل': 'تشغيل',
                'كهرباء': 'كهرباء'
            };
            return map[category] || '';
        }

        function parseDate(dateStr) {
            if (!dateStr) return null;
            try {
                let cleaned = String(dateStr).trim().replace(/\s+/g, ' ');
                cleaned = cleaned.split(' ')[0];
                let parts = cleaned.split('/');
                if (parts.length === 3) {
                    const day = parseInt(parts[0]);
                    const month = parseInt(parts[1]) - 1;
                    const year = parseInt(parts[2]);
                    if (!isNaN(day) && !isNaN(month) && !isNaN(year) && year > 2000) {
                        return new Date(year, month, day);
                    }
                }
                parts = cleaned.split('-');
                if (parts.length === 3) {
                    const day = parseInt(parts[0]);
                    const month = parseInt(parts[1]) - 1;
                    const year = parseInt(parts[2]);
                    if (!isNaN(day) && !isNaN(month) && !isNaN(year) && year > 2000) {
                        return new Date(year, month, day);
                    }
                }
                return null;
            } catch (e) { return null; }
        }

        function displayData(data) {
            const kpiContainer = document.getElementById('kpiContainer');
            const tableContainer = document.getElementById('tableContainer');
            const timeEl = document.getElementById('updateTime');

            if (!data || data.length < 2) {
                kpiContainer.innerHTML = `<div class="error">❌ لا توجد بيانات</div>`;
                tableContainer.innerHTML = `<div class="error">❌ لا توجد بيانات</div>`;
                return;
            }

            const now = new Date();
            timeEl.textContent = now.toLocaleString('ar-EG');

            const headers = data[0].map(h => String(h).trim());
            const rows = data.slice(1);

            // ===== البحث عن الأعمدة =====
            const idxDate = findColumnIndex(headers, 'التاريخ ميلادي');
            const idxDay = findColumnIndex(headers, 'اليوم');
            const idxProperty = findColumnIndex(headers, 'العقار المعني');
            const idxCategory = findColumnIndex(headers, 'قسم النفقات');
            const idxDescription = findColumnIndex(headers, 'البيان / التفصيل التفصيلي');
            const idxQuantity = findColumnIndex(headers, 'الكمية / المدة');
            const idxDailyCost = findColumnIndex(headers, 'التكلفة اليومية/الفرعية');
            const idxTotal = findColumnIndex(headers, 'المبلغ الإجمالي المصروف');

            if (idxTotal === -1) {
                kpiContainer.innerHTML = `<div class="error">❌ لم يتم العثور على أعمدة البيانات</div>`;
                tableContainer.innerHTML = `<div class="error">❌ لم يتم العثور على أعمدة البيانات</div>`;
                return;
            }

            // ===== حساب المؤشرات =====
            let totalExpenses = 0;
            let totalSalaries = 0;
            let totalMaintenance = 0;
            let totalPurchases = 0;
            let totalOperations = 0;
            let totalElectricity = 0;
            const propertyExpenses = {};

            rows.forEach(row => {
                if (!row || row.length === 0) return;
                const total = row[idxTotal] ? cleanNumber(row[idxTotal]) : 0;
                if (total === 0) return;

                totalExpenses += total;

                const category = (idxCategory !== -1 && row[idxCategory]) ? String(row[idxCategory]).trim() : '';
                if (category.includes('رواتب')) totalSalaries += total;
                else if (category.includes('صيانة')) totalMaintenance += total;
                else if (category.includes('مشتريات')) totalPurchases += total;
                else if (category.includes('تشغيل')) totalOperations += total;
                else if (category.includes('كهرباء')) totalElectricity += total;

                const property = (idxProperty !== -1 && row[idxProperty]) ? String(row[idxProperty]).trim() :
                'غير محدد';
                propertyExpenses[property] = (propertyExpenses[property] || 0) + total;
            });

            const sortedProps = Object.entries(propertyExpenses).sort((a, b) => b[1] - a[1]);

            // ===== حفظ المصاريف في localStorage =====
            localStorage.setItem('expensesTotal', JSON.stringify(totalExpenses));

            // ===== عرض بطاقات KPI =====
            kpiContainer.innerHTML = `
                <div class="kpi-grid">
                    <div class="kpi-card">
                        <span class="icon">💰</span>
                        <div class="number">${totalExpenses.toLocaleString()} ر.س</div>
                        <div class="label">إجمالي المصاريف</div>
                    </div>
                    <div class="kpi-card">
                        <span class="icon">👤</span>
                        <div class="number">${totalSalaries.toLocaleString()} ر.س</div>
                        <div class="label">الرواتب</div>
                    </div>
                    <div class="kpi-card">
                        <span class="icon">🔧</span>
                        <div class="number">${totalMaintenance.toLocaleString()} ر.س</div>
                        <div class="label">الصيانة</div>
                    </div>
                    <div class="kpi-card">
                        <span class="icon">🛒</span>
                        <div class="number">${totalPurchases.toLocaleString()} ر.س</div>
                        <div class="label">المشتريات</div>
                    </div>
                    <div class="kpi-card">
                        <span class="icon">⚡</span>
                        <div class="number">${totalOperations.toLocaleString()} ر.س</div>
                        <div class="label">التشغيل</div>
                    </div>
                    <div class="kpi-card electricity">
                        <span class="icon">🔌</span>
                        <div class="number">${totalElectricity.toLocaleString()} ر.س</div>
                        <div class="label">الكهرباء</div>
                    </div>
                </div>
                ${sortedProps.length > 0 ? `
                    <div class="kpi-grid-properties">
                        ${sortedProps.slice(0, 4).map(([name, amount]) => `
                            <div class="kpi-card-property">
                                <div class="number">${amount.toLocaleString()} ر.س</div>
                                <div class="label">🏠 ${name}</div>
                            </div>
                        `).join('')}
                    </div>
                ` : ''}
            `;

            // ===== ترتيب الصفوف حسب التاريخ =====
            const sortedRows = [...rows].filter(row => {
                if (!row || row.length === 0) return false;
                const total = row[idxTotal] ? cleanNumber(row[idxTotal]) : 0;
                return total !== 0;
            }).sort((a, b) => {
                const dateA = a[idxDate] ? parseDate(a[idxDate]) : null;
                const dateB = b[idxDate] ? parseDate(b[idxDate]) : null;
                if (!dateA && !dateB) return 0;
                if (!dateA) return 1;
                if (!dateB) return -1;
                return dateB - dateA;
            });

            // ===== عرض الجدول =====
            let tableRows = '';
            const displayRows = sortedRows.slice(0, 50);
            displayRows.forEach(row => {
                if (!row || row.length === 0) return;
                const total = row[idxTotal] ? cleanNumber(row[idxTotal]) : 0;
                if (total === 0) return;

                const category = (idxCategory !== -1 && row[idxCategory]) ? String(row[idxCategory]).trim() : '-';
                const badgeClass = getBadgeClass(category);

                tableRows += `<tr>
                    <td>${(idxDate !== -1 && row[idxDate]) ? row[idxDate] : '-'}</td>
                    <td>${(idxDay !== -1 && row[idxDay]) ? row[idxDay] : '-'}</td>
                    <td>${(idxProperty !== -1 && row[idxProperty]) ? row[idxProperty] : '-'}</td>
                    <td><span class="badge-expense badge-${badgeClass}">${category}</span></td>
                    <td>${(idxDescription !== -1 && row[idxDescription]) ? row[idxDescription] : '-'}</td>
                    <td>${(idxQuantity !== -1 && row[idxQuantity]) ? row[idxQuantity] : '-'}</td>
                    <td>${(idxDailyCost !== -1 && row[idxDailyCost]) ? row[idxDailyCost] : '-'}</td>
                    <td style="font-weight:600;color:var(--secondary);">${total.toLocaleString()} ر.س</td>
                </tr>`;
            });

            tableContainer.innerHTML = `
                <div class="table-wrapper">
                    <table>
                        <thead><tr>
                            <th>التاريخ</th>
                            <th>اليوم</th>
                            <th>العقار</th>
                            <th>قسم النفقات</th>
                            <th>البيان</th>
                            <th>الكمية</th>
                            <th>التكلفة اليومية</th>
                            <th>المبلغ الإجمالي</th>
                        </tr></thead>
                        <tbody>${tableRows || '<tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:30px;">📭 لا توجد مصاريف مسجلة</td></tr>'}</tbody>
                    </table>
                </div>
                <div class="table-note">📌 يعرض آخر 50 سجل · مرتب حسب التاريخ (الأحدث أولاً) · إجمالي المصاريف: ${totalExpenses.toLocaleString()} ر.س</div>
            `;
        }

        async function loadData() {
            const data = await fetchSheetData();
            if (data && data.length > 0) displayData(data);
            else {
                document.getElementById('kpiContainer').innerHTML = `
                    <div class="error">❌ حدث خطأ في تحميل البيانات
                        <small>تأكد من:
                            <br>1. أن الشيت عام للقراءة
                            <br>2. أن اسم التبويب "${SHEET_NAME}" صحيح
                            <br>3. أن هناك بيانات في الشيت
                        </small>
                    </div>
                `;
                document.getElementById('tableContainer').innerHTML = '';
            }
        }

        loadData();
        setInterval(loadData, 300000);
    </script>
</body>
</html>
