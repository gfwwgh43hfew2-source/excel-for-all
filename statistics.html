<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>فحص الأعمدة</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0a0f1f; color: #eee; padding: 40px; direction: rtl; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #f5c842; }
        .col { background: #121a2e; padding: 10px 15px; margin: 5px 0; border-radius: 8px; border-right: 3px solid #f5c842; }
        .col span { color: #f5c842; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 فحص الأعمدة في الشيت</h1>
        <div id="result">⏳ جاري التحميل...</div>
    </div>

    <script>
        const SHEET_ID = '1u6SM7bWGk2fdiBJLS-N9BO7XXb45QnAp2OqYIw0STpg';
        const SHEET_NAME = 'سجل الحجوزات'; // غيّر هنا لو الاسم مختلف

        async function checkColumns() {
            const result = document.getElementById('result');
            try {
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}?alt=json`;
                const response = await fetch(url);
                const data = await response.json();
                const headers = data.values[0];
                
                let html = `<h2 style="color:#7a8aa0;">الأعمدة الموجودة (${headers.length} عمود):</h2>`;
                headers.forEach((h, i) => {
                    html += `<div class="col"><span>${i+1}.</span> "${h}"</div>`;
                });
                result.innerHTML = html;
            } catch (error) {
                result.innerHTML = `<div style="color:#ff6b6b;">❌ خطأ: ${error.message}<br><br>
                    <small>تأكد من:
                        <br>1. اسم التبويب بالضبط (حساس للأحرف)
                        <br>2. الشيت عام للقراءة
                    </small>
                </div>`;
            }
        }

        checkColumns();
    </script>
</body>
</html>
