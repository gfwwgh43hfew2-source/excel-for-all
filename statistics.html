<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إحصائيات الحجوزات</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0f1f;
            color: #eee;
            padding: 40px 20px;
            direction: rtl;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; color: #f5c842; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #7a8aa0; margin-bottom: 40px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: linear-gradient(145deg, #121a2e, #0e1525);
            padding: 25px 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(245, 200, 66, 0.1);
        }
        .stat-card .number {
            font-size: 2.2rem;
            font-weight: 800;
            color: #f5c842;
        }
        .stat-card .label { color: #8a9ab0; font-size: 0.85rem; }
        .table-wrapper {
            background: #121a2e;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(245, 200, 66, 0.05);
            margin-top: 20px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: #1a2f44; color: #f5c842; padding: 12px 10px; text-align: right; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.03); color: #c0d0e0; }
        .badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-paid { background: #2b8a3e; color: #fff; }
        .badge-balance { background: #c92a2a; color: #fff; }
        .badge-type { background: #1a2f44; color: #8a9ab0; }
        .loading { text-align: center; color: #f5c842; padding: 60px; }
        .error { text-align: center; color: #ff6b6b; padding: 60px; }
        .footer { text-align: center; color: #4a5a70; margin-top: 60px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        .update-time { text-align: center; color: #5a6a7a; font-size: 0.8rem; margin-bottom: 20px; }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .stat-card .number { font-size: 1.5rem; }
            table { font-size: 0.7rem; }
            th, td { padding: 6px; }
        }
        @media (max-width: 480px) { .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 إحصائيات سجل الحجوزات</h1>
        <p class="subtitle">البيانات محدثة تلقائياً من Google Sheets</p>
        <div id="updateTime" class="update-time"></div>
        <div id="statsContainer"><div class="loading">⏳ جاري تحميل البيانات...</div></div>
        <div class="footer">© 2026 الاكسيل للجميع</div>
    </div>

    <script>
        // =============================================
        // 🔑 بيانات الشيت (معدل للـ Sheet1)
        // =============================================
        const SHEET_ID = '1u6SM7bWGk2fdiBJLS-N9BO7XXb45QnAp2OqYIw0STpg';
        const SHEET_NAME = 'Sheet1';

        // =============================================
        // دالة لجلب البيانات
        // =============================================
        async function fetchSheetData() {
            try {
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}?alt=json`;
                const response = await fetch(url, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });
                
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                return data.values;
            } catch (error) {
                console.error('Error:', error);
                // محاولة طريقة بديلة (CSV)
                try {
                    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`;
                    const response = await fetch(url);
                    const csvText = await response.text();
                    const lines = csvText.split('\n');
                    return lines.map(line => line.split(','));
                } catch (error2) {
                    console.error('Alternative error:', error2);
                    return null;
                }
            }
        }

        // =============================================
        // تنظيف الأرقام
        // =============================================
        function cleanNumber(value) {
            if (!value) return 0;
            if (typeof value === 'number') return value;
            const cleaned = String(value).replace(/[^0-9.]/g, '');
            const num = parseFloat(cleaned);
            return isNaN(num) ? 0 : num;
        }

        // =============================================
        // عرض الإحصائيات
        // =============================================
        function displayStatistics(data) {
            const container = document.getElementById('statsContainer');
            const timeEl = document.getElementById('updateTime');

            if (!data || data.length < 2) {
                container.innerHTML = `
                    <div class="error">
                        ❌ لا توجد بيانات كافية.<br>
                        <small>تأكد من أن الشيت يحتوي على بيانات في الصفوف والأعمدة.</small>
                    </div>
                `;
                return;
            }

            const now = new Date();
            timeEl.textContent = `🔄 آخر تحديث: ${now.toLocaleString('ar-EG')}`;

            const headers = data[0];
            const rows = data.slice(1);

            // ===== أرقام الأعمدة =====
            const colIndex = (name) => headers.findIndex(h => h && h.trim() === name);
            
            const idxTotal = colIndex('الإجمالي (صافي الإيراد)');
            const idxPaid = colIndex('المدفوع');
            const idxRemaining = colIndex('المتبقي');
            const idxType = colIndex('نوع الحجز (العقار)');
            const idxStatus = colIndex('حالة السداد');
            const idxDays = colIndex('عدد أيام المبيت');
            const idxName = colIndex('اسم الحجز');
            const idxDate = colIndex('تاريخ الفاتورة');
            const idxNumber = colIndex('رقم الحجز');

            if (idxTotal === -1) {
                container.innerHTML = `<div class="error">❌ لم يتم العثور على عمود "الإجمالي (صافي الإيراد)"<br><small>تأكد من كتابة اسم العمود بالضبط.</small></div>`;
                return;
            }

            // ===== حساب الإحصائيات =====
            let totalRevenue = 0, totalPaid = 0, totalRemaining = 0, totalDays = 0;
            let fullyPaid = 0, balanceDue = 0;
            const properties = {};
            let validRows = 0;

            rows.forEach(row => {
                if (!row || row.length === 0) return;
                const totalVal = row[idxTotal] ? cleanNumber(row[idxTotal]) : 0;
                if (totalVal === 0 && !row[idxName]) return;

                validRows++;
                totalRevenue += totalVal;
                totalPaid += row[idxPaid] ? cleanNumber(row[idxPaid]) : 0;
                totalRemaining += row[idxRemaining] ? cleanNumber(row[idxRemaining]) : 0;
                totalDays += row[idxDays] ? cleanNumber(row[idxDays]) : 0;

                const status = row[idxStatus] ? String(row[idxStatus]).trim() : '';
                if (status.includes('Fully Paid') || status.includes('مدفوع بالكامل')) fullyPaid++;
                else if (status.includes('Balance Due') || status.includes('متبقي')) balanceDue++;

                const prop = row[idxType] ? String(row[idxType]).trim() : 'غير محدد';
                properties[prop] = (properties[prop] || 0) + 1;
            });

            const sortedProps = Object.entries(properties).sort((a, b) => b[1] - a[1]);

            // ===== عرض البطاقات =====
            let statsHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><div class="number">${validRows}</div><div class="label">📋 إجمالي الحجوزات</div></div>
                    <div class="stat-card"><div class="number">${totalRevenue.toLocaleString()} ر.س</div><div class="label">💰 إجمالي الإيرادات</div></div>
                    <div class="stat-card"><div class="number">${totalPaid.toLocaleString()} ر.س</div><div class="label">✅ إجمالي المدفوع</div></div>
                    <div class="stat-card"><div class="number">${totalRemaining.toLocaleString()} ر.س</div><div class="label">⏳ إجمالي المتبقي</div></div>
                    <div class="stat-card"><div class="number">${totalDays.toFixed(1)}</div><div class="label">📅 إجمالي أيام المبيت</div></div>
                    <div class="stat-card"><div class="number">${fullyPaid}</div><div class="label">✅ مدفوع بالكامل</div></div>
                </div>
            `;

            // ===== عرض العقارات =====
            let propsHTML = `<div class="stats-grid" style="margin-top:10px;">`;
            sortedProps.slice(0, 6).forEach(([name, count]) => {
                propsHTML += `<div class="stat-card"><div class="number">${count}</div><div class="label">${name}</div></div>`;
            });
            propsHTML += `</div>`;

            // ===== عرض الجدول =====
            let tableRows = '';
            const displayRows = rows.slice(0, 30);
            displayRows.forEach(row => {
                if (!row || row.length === 0) return;
                const total = row[idxTotal] ? cleanNumber(row[idxTotal]) : 0;
                if (total === 0 && !row[idxName]) return;

                const status = row[idxStatus] ? String(row[idxStatus]).trim() : '';
                const statusBadge = status.includes('Fully Paid') || status.includes('مدفوع بالكامل')
                    ? `<span class="badge badge-paid">مدفوع</span>`
                    : `<span class="badge badge-balance">متبقي</span>`;

                tableRows += `
                    <tr>
                        <td>${row[idxNumber] || '-'}</td>
                        <td>${row[idxName] || '-'}</td>
                        <td><span class="badge badge-type">${row[idxType] || '-'}</span></td>
                        <td>${row[idxDate] || '-'}</td>
                        <td>${total.toLocaleString()} ر.س</td>
                        <td>${(row[idxPaid] ? cleanNumber(row[idxPaid]) : 0).toLocaleString()} ر.س</td>
                        <td>${(row[idxRemaining] ? cleanNumber(row[idxRemaining]) : 0).toLocaleString()} ر.س</td>
                        <td>${statusBadge}</td>
                    </tr>
                `;
            });

            const tableHTML = `
                <div style="color:#f5c842;font-size:1.5rem;margin:40px 0 20px;">📋 آخر الحجوزات</div>
                <div class="table-wrapper">
                    <table>
                        <thead><tr><th>رقم الحجز</th><th>اسم الحجز</th><th>نوع العقار</th><th>التاريخ</th><th>الإجمالي</th><th>المدفوع</th><th>المتبقي</th><th>الحالة</th></tr></thead>
                        <tbody>${tableRows || '<tr><td colspan="8" style="text-align:center;color:#5a6a7a;">لا توجد بيانات</td></tr>'}</tbody>
                    </table>
                </div>
            `;

            container.innerHTML = statsHTML + propsHTML + tableHTML;
        }

        // =============================================
        // تحميل البيانات
        // =============================================
        async function loadData() {
            const container = document.getElementById('statsContainer');
            container.innerHTML = '<div class="loading">⏳ جاري تحميل البيانات...</div>';
            const data = await fetchSheetData();
            if (data) displayStatistics(data);
            else {
                container.innerHTML = `
                    <div class="error">
                        ❌ حدث خطأ في تحميل البيانات.<br><br>
                        <small>تأكد من:
                            <br>1. الشيت عام للقراءة (Share → Anyone with the link can view)
                            <br>2. اسم الشيت "Sheet1" بالضبط (حساس لحالة الأحرف)
                            <br>3. الـ Sheet ID صحيح
                        </small>
                    </div>
                `;
            }
        }

        loadData();
        setInterval(loadData, 300000);
    </script>
</body>
</html>
