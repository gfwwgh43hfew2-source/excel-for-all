<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إحصائيات الحجوزات</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0f1f;
            color: #eee;
            padding: 20px 12px;
            direction: rtl;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        h1 {
            text-align: center;
            color: #f5c842;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #7a8aa0;
            font-size: 0.95rem;
            margin-bottom: 25px;
        }
        
        /* ===== البطاقات ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(145deg, #121a2e, #0e1525);
            padding: 18px 12px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(245, 200, 66, 0.1);
        }
        .stat-card .number {
            font-size: 1.8rem;
            font-weight: 800;
            color: #f5c842;
        }
        .stat-card .label {
            color: #8a9ab0;
            font-size: 0.75rem;
            margin-top: 4px;
        }
        
        /* ===== الجدول ===== */
        .table-wrapper {
            background: #121a2e;
            border-radius: 16px;
            overflow-x: auto; /* التمرير الأفقي للجدول */
            border: 1px solid rgba(245, 200, 66, 0.05);
            margin-top: 15px;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            min-width: 600px; /* عشان يظهر السكرول على الموبايل */
        }
        th {
            background: #1a2f44;
            color: #f5c842;
            padding: 10px 8px;
            text-align: right;
            white-space: nowrap;
            font-size: 0.75rem;
        }
        td {
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            color: #c0d0e0;
            font-size: 0.75rem;
        }
        
        /* ===== الشارات ===== */
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 50px;
            font-size: 0.65rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .badge-paid { background: #2b8a3e; color: #fff; }
        .badge-balance { background: #c92a2a; color: #fff; }
        .badge-type { background: #1a2f44; color: #8a9ab0; }
        
        /* ===== الحالات ===== */
        .loading {
            text-align: center;
            color: #f5c842;
            padding: 40px 20px;
            font-size: 1.1rem;
        }
        .error {
            text-align: center;
            color: #ff6b6b;
            padding: 40px 20px;
            font-size: 0.95rem;
        }
        .error small {
            display: block;
            margin-top: 12px;
            color: #7a8aa0;
            font-size: 0.8rem;
            line-height: 1.8;
        }
        
        /* ===== الفوتر ===== */
        .footer {
            text-align: center;
            color: #4a5a70;
            margin-top: 40px;
            padding-top: 18px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.8rem;
        }
        .update-time {
            text-align: center;
            color: #5a6a7a;
            font-size: 0.7rem;
            margin-bottom: 15px;
        }
        
        .section-title {
            color: #f5c842;
            font-size: 1.2rem;
            margin: 30px 0 12px;
            text-align: center;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            body { padding: 12px 8px; }
            h1 { font-size: 1.4rem; }
            .subtitle { font-size: 0.8rem; margin-bottom: 18px; }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .stat-card {
                padding: 14px 8px;
                border-radius: 12px;
            }
            .stat-card .number {
                font-size: 1.4rem;
            }
            .stat-card .label {
                font-size: 0.65rem;
            }
            
            .table-wrapper {
                border-radius: 12px;
            }
            table {
                font-size: 0.65rem;
                min-width: 480px;
            }
            th {
                padding: 8px 5px;
                font-size: 0.6rem;
            }
            td {
                padding: 6px 5px;
                font-size: 0.6rem;
            }
            .badge {
                font-size: 0.55rem;
                padding: 2px 8px;
            }
            .section-title {
                font-size: 1rem;
            }
            .footer {
                font-size: 0.7rem;
                margin-top: 30px;
            }
        }

        @media (max-width: 400px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            .stat-card .number {
                font-size: 1.2rem;
            }
            table {
                min-width: 400px;
                font-size: 0.55rem;
            }
            th, td {
                padding: 5px 4px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 إحصائيات الحجوزات</h1>
        <p class="subtitle">البيانات محدثة تلقائياً من Google Sheets</p>
        <div id="updateTime" class="update-time"></div>
        <div id="statsContainer"><div class="loading">⏳ جاري تحميل البيانات...</div></div>
        <div class="footer">© 2026 الاكسيل للجميع</div>
    </div>

    <script>
        // =============================================
        // 🔑 بيانات الشيت
        // =============================================
        const SHEET_ID = '1u6SM7bWGk2fdiBJLS-N9BO7XXb45QnAp2OqYIw0STpg';
        const SHEET_NAME = 'Sheet1';

        // =============================================
        // دالة لجلب البيانات (طريقة CSV)
        // =============================================
        async function fetchSheetData() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`;
                const response = await fetch(url);
                
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const csvText = await response.text();
                const lines = csvText.split('\n').filter(line => line.trim() !== '');
                const data = lines.map(line => {
                    const row = [];
                    let current = '';
                    let insideQuotes = false;
                    for (let i = 0; i < line.length; i++) {
                        const char = line[i];
                        if (char === '"') {
                            insideQuotes = !insideQuotes;
                        } else if (char === ',' && !insideQuotes) {
                            row.push(current.trim());
                            current = '';
                        } else {
                            current += char;
                        }
                    }
                    row.push(current.trim());
                    return row;
                });
                
                return data;
            } catch (error) {
                console.error('Error fetching CSV:', error);
                return null;
            }
        }

        // =============================================
        // تنظيف الأرقام
        // =============================================
        function cleanNumber(value) {
            if (!value) return 0;
            if (typeof value === 'number') return value;
            const cleaned = String(value).replace(/[^0-9.]/g, '');
            const num = parseFloat(cleaned);
            return isNaN(num) ? 0 : num;
        }

        // =============================================
        // دالة للبحث عن العمود
        // =============================================
        function findColumnIndex(headers, targetName) {
            const clean = (str) => String(str).trim().replace(/\s+/g, ' ');
            let idx = headers.findIndex(h => clean(h) === clean(targetName));
            if (idx !== -1) return idx;
            idx = headers.findIndex(h => clean(h).includes(clean(targetName)));
            return idx;
        }

        // =============================================
        // عرض الإحصائيات
        // =============================================
        function displayStatistics(data) {
            const container = document.getElementById('statsContainer');
            const timeEl = document.getElementById('updateTime');

            if (!data || data.length < 2) {
                container.innerHTML = `
                    <div class="error">
                        ❌ لا توجد بيانات كافية.
                        <small>تأكد من أن الشيت يحتوي على بيانات في الصفوف والأعمدة.</small>
                    </div>
                `;
                return;
            }

            const now = new Date();
            timeEl.textContent = `🔄 آخر تحديث: ${now.toLocaleString('ar-EG')}`;

            const headers = data[0].map(h => String(h).trim());
            const rows = data.slice(1);

            // ===== البحث عن الأعمدة =====
            const idxTotal = findColumnIndex(headers, 'الإجمالي (صافي الإيراد)');
            const idxPaid = findColumnIndex(headers, 'المدفوع');
            const idxRemaining = findColumnIndex(headers, 'المتبقي');
            const idxType = findColumnIndex(headers, 'نوع الحجز (العقار)');
            const idxStatus = findColumnIndex(headers, 'حالة السداد');
            const idxDays = findColumnIndex(headers, 'عدد أيام المبيت');
            const idxName = findColumnIndex(headers, 'اسم الحجز');
            const idxDate = findColumnIndex(headers, 'تاريخ الفاتورة');
            const idxNumber = findColumnIndex(headers, 'رقم الحجز');

            if (idxTotal === -1) {
                container.innerHTML = `
                    <div class="error">
                        ❌ لم يتم العثور على عمود "الإجمالي (صافي الإيراد)"
                        <small>الأعمدة الموجودة:<br>${headers.map((h, i) => `${i+1}. "${h}"`).join('<br>')}</small>
                    </div>
                `;
                return;
            }

            // ===== حساب الإحصائيات =====
            let totalRevenue = 0, totalPaid = 0, totalRemaining = 0, totalDays = 0;
            let fullyPaid = 0, balanceDue = 0;
            const properties = {};
            let validRows = 0;

            rows.forEach(row => {
                if (!row || row.length === 0) return;
                const totalVal = row[idxTotal] ? cleanNumber(row[idxTotal]) : 0;
                if (totalVal === 0 && !row[idxName]) return;

                validRows++;
                totalRevenue += totalVal;
                totalPaid += (idxPaid !== -1 && row[idxPaid]) ? cleanNumber(row[idxPaid]) : 0;
                totalRemaining += (idxRemaining !== -1 && row[idxRemaining]) ? cleanNumber(row[idxRemaining]) : 0;
                totalDays += (idxDays !== -1 && row[idxDays]) ? cleanNumber(row[idxDays]) : 0;

                if (idxStatus !== -1) {
                    const status = String(row[idxStatus]).trim();
                    if (status.includes('Fully Paid') || status.includes('مدفوع بالكامل')) fullyPaid++;
                    else if (status.includes('Balance Due') || status.includes('متبقي')) balanceDue++;
                }

                if (idxType !== -1) {
                    const prop = String(row[idxType]).trim() || 'غير محدد';
                    properties[prop] = (properties[prop] || 0) + 1;
                }
            });

            const sortedProps = Object.entries(properties).sort((a, b) => b[1] - a[1]);

            // ===== عرض البطاقات =====
            let statsHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><div class="number">${validRows}</div><div class="label">📋 إجمالي الحجوزات</div></div>
                    <div class="stat-card"><div class="number">${totalRevenue.toLocaleString()}</div><div class="label">💰 إجمالي الإيرادات</div></div>
                    <div class="stat-card"><div class="number">${totalPaid.toLocaleString()}</div><div class="label">✅ إجمالي المدفوع</div></div>
                    <div class="stat-card"><div class="number">${totalRemaining.toLocaleString()}</div><div class="label">⏳ إجمالي المتبقي</div></div>
                    <div class="stat-card"><div class="number">${totalDays.toFixed(1)}</div><div class="label">📅 إجمالي أيام المبيت</div></div>
                    <div class="stat-card"><div class="number">${fullyPaid}</div><div class="label">✅ مدفوع بالكامل</div></div>
                </div>
            `;

            // ===== عرض العقارات =====
            let propsHTML = `<div class="stats-grid" style="margin-top:5px;">`;
            sortedProps.slice(0, 6).forEach(([name, count]) => {
                propsHTML += `<div class="stat-card"><div class="number">${count}</div><div class="label">${name}</div></div>`;
            });
            propsHTML += `</div>`;

            // ===== عرض الجدول =====
            let tableRows = '';
            const displayRows = rows.slice(0, 30);
            displayRows.forEach(row => {
                if (!row || row.length === 0) return;
                const total = row[idxTotal] ? cleanNumber(row[idxTotal]) : 0;
                if (total === 0 && !row[idxName]) return;

                let statusBadge = `<span class="badge badge-balance">متبقي</span>`;
                if (idxStatus !== -1) {
                    const status = String(row[idxStatus]).trim();
                    if (status.includes('Fully Paid') || status.includes('مدفوع بالكامل')) {
                        statusBadge = `<span class="badge badge-paid">مدفوع</span>`;
                    }
                }

                tableRows += `
                    <tr>
                        <td>${(idxNumber !== -1 && row[idxNumber]) ? row[idxNumber] : '-'}</td>
                        <td>${(idxName !== -1 && row[idxName]) ? row[idxName] : '-'}</td>
                        <td><span class="badge badge-type">${(idxType !== -1 && row[idxType]) ? row[idxType] : '-'}</span></td>
                        <td>${(idxDate !== -1 && row[idxDate]) ? row[idxDate] : '-'}</td>
                        <td>${total.toLocaleString()}</td>
                        <td>${(idxPaid !== -1 && row[idxPaid]) ? cleanNumber(row[idxPaid]).toLocaleString() : '0'}</td>
                        <td>${(idxRemaining !== -1 && row[idxRemaining]) ? cleanNumber(row[idxRemaining]).toLocaleString() : '0'}</td>
                        <td>${statusBadge}</td>
                    </tr>
                `;
            });

            const tableHTML = `
                <div class="section-title">📋 آخر الحجوزات</div>
                <div class="table-wrapper">
                    <table>
                        <thead><tr><th>رقم الحجز</th><th>اسم الحجز</th><th>نوع العقار</th><th>التاريخ</th><th>الإجمالي</th><th>المدفوع</th><th>المتبقي</th><th>الحالة</th></tr></thead>
                        <tbody>${tableRows || '<tr><td colspan="8" style="text-align:center;color:#5a6a7a;padding:20px;">لا توجد بيانات</td></tr>'}</tbody>
                    </table>
                </div>
            `;

            container.innerHTML = statsHTML + propsHTML + tableHTML;
        }

        // =============================================
        // تحميل البيانات
        // =============================================
        async function loadData() {
            const container = document.getElementById('statsContainer');
            container.innerHTML = '<div class="loading">⏳ جاري تحميل البيانات...</div>';
            const data = await fetchSheetData();
            if (data && data.length > 0) {
                displayStatistics(data);
            } else {
                container.innerHTML = `
                    <div class="error">
                        ❌ حدث خطأ في تحميل البيانات.
                        <small>
                            تأكد من:
                            <br>1. الشيت عام للقراءة (Share → Anyone with the link can view)
                            <br>2. اسم التبويب "${SHEET_NAME}" صحيح
                            <br>3. الـ ID صحيح: ${SHEET_ID}
                        </small>
                    </div>
                `;
            }
        }

        loadData();
        setInterval(loadData, 300000);
    </script>
</body>
</html>
